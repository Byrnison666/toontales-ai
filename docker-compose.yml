x-app: &app
  image: toontales-ai:local
  build:
    context: .
    dockerfile: Dockerfile
  env_file:
    - .env

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: toontales
      POSTGRES_PASSWORD: toontales
      POSTGRES_DB: toontales
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U toontales -d toontales"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Миграции вынесены в one-shot сервис, чтобы приложение не стартовало с устаревшей схемой.
  migrate:
    <<: *app
    command: ["alembic", "upgrade", "head"]
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy

  api:
    <<: *app
    command: ["uvicorn", "toontales_ai.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  worker:
    <<: *app
    command: ["celery", "-A", "toontales_ai.workers.celery_app", "worker", "--loglevel=info"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  beat:
    <<: *app
    command: ["celery", "-A", "toontales_ai.workers.celery_app", "beat", "--loglevel=info"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
