# Prometheus alerting rules для ToonTales.
#
# ВНИМАНИЕ: Prometheus в прод-стек (docker-compose.prod.yml) пока не входит —
# сервисы только отдают /metrics. Этот файл готов к подключению, но сам по себе
# ничего не делает: без запущенного Prometheus правила никем не читаются.
# Подключение — см. deploy/README.md, раздел «Мониторинг».
#
# Группа margin_guard — про то, чего не видно в коде: наши тарифы провайдеров
# захардкожены (orchestration/real_cost.py), и рост цен у провайдера НЕ меняет
# наш расчёт себестоимости. Маржа проседает молча. Эти правила — единственная
# автоматика, которая об этом скажет.

groups:
  - name: margin_guard
    rules:
      - alert: RunChargeCappedByBalance
        # Прайсинг v3: списание за успешный ролик зажато балансом (списали меньше
        # price). Баланс просел мимо старт-проверки — как правило, ручная правка
        # админом вниз во время активного ролика. Это недополученная выручка и
        # сигнал возможного абуза.
        expr: increase(toontales_run_charge_capped_by_balance_total[1h]) > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Списание за ролик зажато балансом (недоплата)"
          description: >-
            _charge_run списал меньше price: баланс просел мимо старт-проверки.
            Проверить историю ручных правок баланса (admin) и ledger по этим ранам.

      - alert: TariffReviewOverdue
        # Тариф давно не сверяли с прайс-листом руками. Само по себе не инцидент,
        # но чем дольше, тем выше шанс, что расчёт себестоимости уже врёт.
        expr: toontales_tariff_age_days > 90
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "Тариф {{ $labels.provider }} не сверялся {{ $value | humanize }} дней"
          description: >-
            Открыть прайс провайдера, сверить с orchestration/real_cost.py и
            обновить TARIFF_CHECKED_AT вместе с цифрами. Расхождение расчёта с
            инвойсом проверяется через GET /api/v1/admin/provider-spend.

      - alert: TariffReviewCriticallyOverdue
        expr: toontales_tariff_age_days > 180
        for: 1h
        labels:
          severity: critical
        annotations:
          summary: "Тариф {{ $labels.provider }} не сверялся полгода"
          description: >-
            Расчёт себестоимости и, следовательно, вся отчётность по наценке
            больше не заслуживают доверия.

  - name: pipeline_health
    rules:
      - alert: ProviderErrorRateHigh
        expr: sum(rate(toontales_provider_errors_total[15m])) by (stage) > 0.1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Ошибки провайдера на стадии {{ $labels.stage }}"
          description: "Более 6 ошибок в минуту в течение 10 минут."

      - alert: TasksStuckAndReconciled
        # Реконсиляция чинит зависшие задачи — это норма как страховка, но
        # регулярные срабатывания означают, что где-то теряются колбэки.
        expr: increase(toontales_reconciled_tasks_total[1h]) > 10
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Реконсиляция вытаскивает много задач ({{ $labels.reconciliation_type }})"
          description: "Проверить доставку webhook/poll от провайдеров."

      - alert: RunFailureRateHigh
        # Прайсинг v3 не списывает на старте: провалившийся ролик = сожжённые
        # деньги провайдеров (Runway/ElevenLabs) без выручки. Высокая доля провалов
        # — либо сбой пайплайна/провайдера, либо абуз (гонять до провала). За окно
        # считаем долю failed среди терминальных исходов.
        expr: >-
          sum(increase(toontales_run_outcomes_total{outcome="failed"}[1h]))
          /
          clamp_min(sum(increase(toontales_run_outcomes_total[1h])), 1) > 0.3
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Высокая доля проваленных роликов (>30% за час)"
          description: >-
            Провал не списывает с юзера, но провайдерские расходы уже понесены.
            Проверить ошибки провайдеров (toontales_provider_errors_total) и
            паттерн по юзерам (возможен абуз длинными роликами до провала).
