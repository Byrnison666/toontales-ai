# Prometheus для прод-стека ToonTales. Скрейпит api/worker/beat внутри
# compose-сети и вычисляет правила из alerts.yml. UI/API наружу НЕ публикуется
# (см. docker-compose.prod.yml: порт на 127.0.0.1) — доступ через SSH-туннель.
#
# ВНИМАНИЕ: Prometheus только вычисляет и показывает алерты в своём UI (вкладка
# Alerts). Маршрутизация уведомлений (email/telegram) — отдельный компонент
# Alertmanager, в стек пока не входит.

global:
  scrape_interval: 30s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: toontales-api
    # FastAPI отдаёт метрики на /metrics основного порта (внутри сети — api:8000).
    static_configs:
      - targets: ["api:8000"]

  - job_name: toontales-workers
    # celery worker/beat поднимают prometheus_client на 9100 внутри контейнера.
    static_configs:
      - targets: ["worker:9100", "beat:9100"]
